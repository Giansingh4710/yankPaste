services:
  server:
    build:
      context: .
    image: yankpaste_server
    depends_on:
      yp-database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://yp-database:27017/yankPaste
    ports:
      - 3000:3000
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  yp-database:
    image: mongo:6
    volumes:
      - database:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  database:
  uploads:
